<script src="https://unpkg.com/html5-qrcode"></script>

<script type="module">
    // 1. IMPORT FIREBASE CDN MODUL (VERSI WEB STATIS)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // 2. CONFIG CONFIGURASI FIREBASE MILIKMU
    const firebaseConfig = {
        apiKey: "AIzaSyBD9E45AQWXbsy_D1IwGkYWlt4soelcITg",
        authDomain: "qr-presention.firebaseapp.com",
        databaseURL: "https://qr-presention-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "qr-presention",
        storageBucket: "qr-presention.firebasestorage.app",
        messagingSenderId: "1030746972374",
        appId: "1:1030746972374:web:ab66c5c75287a341c1e977",
        measurementId: "G-PTMC1VZGXT"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 3. CEK LOGIN USER
    const sessionData = localStorage.getItem('userSession');
    if (!sessionData) {
        alert("Akses ditolak! Anda harus login terlebih dahulu.");
        window.location.href = 'index.html';
    }

    const dataMahasiswa = JSON.parse(sessionData);
    document.getElementById('txtNama').innerText = dataMahasiswa.nama;
    document.getElementById('txtNim').innerText = dataMahasiswa.nim;
    document.getElementById('txtEmail').innerText = dataMahasiswa.email;

    // 4. FUNGSI SCAN SUKSES -> KIRIM KE FIREBASE CLOUD
    function onScanSuccess(decodedText, decodedResult) {
        html5QrcodeScanner.clear();
        document.getElementById('result').innerText = "Mengirim data presensi ke server cloud...";

        // Validasi Token QR Kelas kamu
        if (decodedText === "KELAS_E_2026") {
            const sekarang = new Date();
            const jamMenitDetik = sekarang.toLocaleTimeString('id-ID');

            // Kirim data mahasiswa ke tabel 'presensi_kelas' di Firebase
            push(ref(db, 'presensi_kelas'), {
                nim: dataMahasiswa.nim,
                nama: dataMahasiswa.nama,
                waktu: jamMenitDetik
            })
            .then(() => {
                document.getElementById('result').innerHTML = `🎉 PRESENSI SUKSES!<br>Selamat ${dataMahasiswa.nama} tercatat secara universal.`;
            })
            .catch((error) => {
                document.getElementById('result').innerHTML = `<span style="color:red;">Gagal ke server: ${error.message}</span>`;
            });

        } else {
            document.getElementById('result').innerHTML = `<span style="color:red;">QR Code tidak valid!</span>`;
        }
    }

    // Jalankan Kamera Scanner
    let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    html5QrcodeScanner.render(onScanSuccess);

    // Tempel fungsi logout agar bisa diakses global
    window.logout = function() {
        localStorage.removeItem('userSession');
        window.location.href = 'index.html';
    }
</script>
