<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 Scan Presensi Mahasiswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0f2f5; min-height: 100vh; display: flex; align-items: center; }
        .card-presensi { border: none; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); overflow: hidden; }
        .card-header-custom { background: linear-gradient(135deg, #007bff, #0056b3); color: white; padding: 20px; text-align: center; }
        #reader { border: none !important; border-radius: 12px; overflow: hidden; background: #fafafa; }
        #reader__dashboard_section_csr button { background-color: #007bff !important; color: white !important; border: none !important; padding: 8px 16px !important; border-radius: 6px !important; }
        .info-box { background-color: #f8f9fa; border-radius: 12px; border-left: 5px solid #007bff; }
        .info-item { margin-bottom: 6px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container my-4">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card card-presensi">
                <div class="card-header-custom">
                    <h4 class="mb-1"><i class="fa-solid fa-camera-retro me-2"></i>Scanner Presensi</h4>
                    <p class="small mb-0 opacity-75">Arahkan kamera ke QR Code di layar kelas</p>
                </div>
                <div class="card-body p-4">
                    
                    <div class="info-box p-3 mb-4">
                        <div class="info-item">👤 <span class="text-muted">Nama:</span> <strong id="txtNama" class="text-dark">-</strong></div>
                        <div class="info-item">🆔 <span class="text-muted">NIM:</span> <strong id="txtNim" class="text-dark">-</strong></div>
                        <div class="info-item">📧 <span class="text-muted">Email:</span> <strong id="txtEmail" class="text-dark">-</strong></div>
                    </div>

                    <div id="reader" class="mb-4"></div>
                    
                    <div id="result" class="text-center fw-bold text-success my-3 fs-5"></div>
                    
                    <div class="d-grid gap-2">
                        <button class="btn btn-outline-secondary border-2" onclick="window.logout()">
                            <i class="fa-solid fa-arrow-right-from-bracket me-2"></i>Keluar Sesi
                        </button>
                        
                        <button class="btn btn-danger fw-bold" onclick="window.hapusAkunTotal()">
                            <i class="fa-solid fa-user-slash me-2"></i>Hapus Akun & Reset HP Ini
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Konfigurasi Firebase Proyek Barumu
    const firebaseConfig = {
        apiKey: "AIzaSyCUuXQDLLxX97PDJ1xaCkFPwAARAi2vJ8o",
        authDomain: "qr-presence-f8f14.firebaseapp.com",
        databaseURL: "https://qr-presence-f8f14-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "qr-presence-f8f14",
        storageBucket: "qr-presence-f8f14.firebasestorage.app",
        messagingSenderId: "506287590811",
        appId: "1:506287590811:web:8f180bf07b75dcaa33653e",
        measurementId: "G-R3028BJMYS"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Memeriksa Session Login Aktif
    const sessionData = localStorage.getItem('userSession');
    if (!sessionData) {
        alert("Akses ditolak! Anda harus login terlebih dahulu.");
        window.location.href = 'index.html';
    }

    const dataMahasiswa = JSON.parse(sessionData);
    document.getElementById('txtNama').innerText = dataMahasiswa.nama;
    document.getElementById('txtNim').innerText = dataMahasiswa.nim;
    document.getElementById('txtEmail').innerText = dataMahasiswa.email;

    // Fungsi Scan Sukses -> Kirim ke Firebase Cloud
    function onScanSuccess(decodedText, decodedResult) {
        html5QrcodeScanner.clear();
        document.getElementById('result').innerHTML = `<div class="spinner-border text-primary spinner-border-sm" role="status"></div> Mengirim presensi...`;

        if (decodedText === "KELAS_E_2026") {
            const sekarang = new Date();
            const jamMenitDetik = Clinical = sekarang.toLocaleTimeString('id-ID');

            push(ref(db, 'presensi_kelas'), {
                nim: dataMahasiswa.nim,
                nama: dataMahasiswa.nama,
                waktu: jamMenitDetik
            })
            .then(() => {
                document.getElementById('result').innerHTML = `<div class="alert alert-success border-0 shadow-sm">🎉 PRESENSI SUKSES!<br><small class="fw-normal">Terima kasih, data Anda sudah terekam secara universal di server.</small></div>`;
            })
            .catch((error) => {
                document.getElementById('result').innerHTML = `<div class="alert alert-danger border-0">Gagal mengirim ke server: ${error.message}</div>`;
            });

        } else {
            document.getElementById('result').innerHTML = `<div class="alert alert-danger border-0">⚠️ Token QR Code Tidak Valid!</div>`;
        }
    }

    let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    html5QrcodeScanner.render(onScanSuccess);

    // Aksi tombol Logout biasa
    window.logout = function() {
        localStorage.removeItem('userSession');
        window.location.href = 'index.html';
    }

    // --- PERBAIKAN DI SINI (Nama fungsi disamakan menjadi hapusAkunTotal) ---
    window.hapusAkunTotal = function() {
        if (confirm("Apakah Anda yakin ingin menghapus total akun pendaftaran di perangkat ini? Anda harus mendaftar ulang setelah ini.")) {
            localStorage.clear(); // Menghapus total seluruh memori pendaftaran di HP/Laptop tersebut
            alert("Akun pendaftaran berhasil dihapus dari HP ini!");
            window.location.href = 'index.html';
        }
    }
</script>
</body>
</html>
