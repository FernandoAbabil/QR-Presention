<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Scanner Kelas & Daftar Hadir</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 30px 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #qrcode { margin: 20px auto; display: inline-block; padding: 10px; background: #fff; border: 1px solid #ccc; }
        
        /* Styling Tabel Daftar Hadir */
        .table-container { margin-top: 40px; text-align: left; }
        .header-tabel { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        h2 { margin: 0; color: #007bff; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { padding: 12px 15px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #007bff; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .empty-row { text-align: center; color: #888; font-style: italic; }
        
        /* Styling Tombol-Tombol */
        .btn-danger-sm { background-color: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-danger-sm:hover { background-color: #c82333; }
        .btn-warning { background-color: #ffc107; color: #212529; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-warning:hover { background-color: #e0a800; }
    </style>
</head>
<body>

<div class="container">
    <h1>SILAHKAN SCAN UNTENSY</h1>
    <p style="font-size: 16px; color: #666;">Rentang NIM Valid: <strong>H1H025001 - H1H025035</strong></p>
    
    <div id="qrcode"></div>
    
    <p style="font-size: 18px; margin-top: 10px;">Total Hadir: <strong id="totalHadir">0</strong> Mahasiswa</p>

    <div class="table-container">
        <div class="header-tabel">
            <h2>👥 Daftar Hadir Mahasiswa (Real-time)</h2>
            <button class="btn-warning" onclick="hapusSemuaPresensi()">Clear Semua</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>No</th>
                    <th>NIM</th>
                    <th>Nama Lengkap</th>
                    <th>Waktu Presensi</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tabelPresensi">
                <tr id="noDataRow">
                    <td colspan="5" class="empty-row">Belum ada mahasiswa yang melakukan presensi.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 1. GENERATE QR CODE
    const tokenPresensi = "KELAS_E_2026"; 
    
    new QRCode(document.getElementById("qrcode"), {
        text: tokenPresensi,
        width: 250,
        height: 250
    });

    // 2. LOAD DATA AWAL DARI MEMORI BROWSER (LOCALSTORAGE)
    // Jika sebelumnya sudah ada data tersimpan, pakai data itu. Jika kosong, buat array baru []
    let listHadir = JSON.parse(localStorage.getItem('databaseKelas')) || [];

    // 3. FUNGSI UNTUK MERENDER ULANG TABEL
    function perbaruiTabel() {
        const tbody = document.getElementById('tabelPresensi');
        const totalHadirTxt = document.getElementById('totalHadir');
        
        totalHadirTxt.innerText = listHadir.length;

        if (listHadir.length === 0) {
            tbody.innerHTML = `<tr id="noDataRow"><td colspan="5" class="empty-row">Belum ada mahasiswa yang melakukan presensi.</td></tr>`;
            return;
        }

        tbody.innerHTML = "";

        listHadir.forEach((mhs, index) => {
            const row = `
                <tr>
                    <td>${index + 1}</td>
                    <td><strong>${mhs.nim}</strong></td>
                    <td>${mhs.nama}</td>
                    <td>${mhs.waktu}</td>
                    <td>
                        <button class="btn-danger-sm" onclick="hapusBaris(${index})">Hapus</button>
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    // 4. FUNGSI MENGHAPUS SATU BARIS SPESIFIK & UPDATE MEMORI
    function hapusBaris(index) {
        const mhsDihapus = listHadir[index];
        if (confirm(`Apakah Anda yakin ingin menghapus presensi ${mhsDihapus.nama} (${mhsDihapus.nim})?`)) {
            listHadir.splice(index, 1);
            
            // Simpan perubahan ke memori setelah dihapus
            localStorage.setItem('databaseKelas', JSON.stringify(listHadir));
            perbaruiTabel();
        }
    }

    // 5. FUNGSI MENGHAPUS SELURUH DAFTAR HADIR & KOSONGKAN MEMORI
    function hapusSemuaPresensi() {
        if (listHadir.length === 0) {
            alert("Tabel memang sudah kosong!");
            return;
        }
        
        if (confirm("Apakah Anda yakin ingin mengosongkan seluruh daftar hadir kelas ini?")) {
            listHadir = []; 
            // Hapus data kunci 'databaseKelas' dari memori
            localStorage.removeItem('databaseKelas');
            perbaruiTabel(); 
        }
    }

    // 6. MENDENGARKAN SINYAL SCAN MAHASISWA & SIMPAN OTOMATIS
    window.addEventListener('storage', function(e) {
        if (e.key === 'userSession' && e.newValue) {
            const dataBaru = JSON.parse(e.newValue);
            
            const sekarang = new Date();
            const jamMenitDetik = sekarang.toLocaleTimeString('id-ID');

            const sudahAda = listHadir.some(mhs => mhs.nim === dataBaru.nim);

            if (!sudahAda) {
                listHadir.push({
                    nim: dataBaru.nim,
                    nama: dataBaru.nama,
                    waktu: jamMenitDetik
                });
                
                // SIMPAN ARRAY DATA HADIR TERBARU KE LOCALSTORAGE
                localStorage.setItem('databaseKelas', JSON.stringify(listHadir));
                perbaruiTabel();
            }
        }
    });

    // Jalankan perbarui tabel pertama kali saat web dibuka/di-refresh
    perbaruiTabel();
</script>

</body>
</html>
